<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bgGrad" cx="48%" cy="24%" r="90%">
      <stop offset="0%" stop-color="#0f4a34"/>
      <stop offset="48%" stop-color="#0a3d2a"/>
      <stop offset="100%" stop-color="#0b1f17"/>
    </radialGradient>
    <radialGradient id="moonGlow" cx="44%" cy="34%" r="34%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.34"/>
      <stop offset="55%" stop-color="#c9a84c" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldGrad" x1="20%" y1="10%" x2="80%" y2="92%">
      <stop offset="0%" stop-color="#d9bc64"/>
      <stop offset="55%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#b99029"/>
    </linearGradient>
    <linearGradient id="bookGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#fff8e7" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0.28"/>
    </linearGradient>
    <filter id="bgInset" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#020806" flood-opacity="0.5"/>
    </filter>
    <filter id="crescentLight" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#d4af37" flood-opacity="0.28"/>
    </filter>
    <filter id="calligraphyGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#d4af37" flood-opacity="0.34"/>
      <feDropShadow dx="0" dy="0" stdDeviation="42" flood-color="#c9a84c" flood-opacity="0.16"/>
    </filter>
    <filter id="bookGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#d4af37" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="#0b1f17"/>
  <rect x="16" y="16" width="992" height="992" rx="224" fill="url(#bgGrad)" filter="url(#bgInset)"/>
  <rect x="34" y="34" width="956" height="956" rx="206" fill="none" stroke="#d4af37" stroke-width="2" opacity="0.12"/>

  <ellipse cx="500" cy="364" rx="268" ry="228" fill="url(#moonGlow)"/>

  <g filter="url(#crescentLight)">
    <circle cx="462" cy="350" r="196" fill="url(#goldGrad)"/>
    <circle cx="546" cy="312" r="176" fill="#0b241b"/>
  </g>

  <g opacity="0.12">
    <path d="M410 330c-24 31-44 72-61 125" fill="none" stroke="#d4af37" stroke-width="10" stroke-linecap="round"/>
    <path d="M447 344c-18 38-30 82-37 129" fill="none" stroke="#fff8e7" stroke-width="7" stroke-linecap="round"/>
    <path d="M486 362c-11 31-18 67-22 106" fill="none" stroke="#d4af37" stroke-width="5" stroke-linecap="round"/>
  </g>

  <g filter="url(#calligraphyGlow)">
    <text x="512" y="590" text-anchor="middle" direction="rtl" unicode-bidi="bidi-override" font-family="Noto Naskh Arabic, serif" font-size="254" font-weight="700" letter-spacing="2" fill="#fff8e7">فلاح</text>
  </g>

  <g filter="url(#bookGlow)" opacity="0.72">
    <path d="M338 690c52-32 110-48 174-48 64 0 122 16 174 48" fill="none" stroke="url(#bookGrad)" stroke-width="20" stroke-linecap="round"/>
    <path d="M402 674c33-11 70-16 110-16 40 0 77 5 110 16" fill="none" stroke="#c9a84c" stroke-width="6" stroke-linecap="round" opacity="0.42"/>
    <path d="M512 650v72" fill="none" stroke="#fff8e7" stroke-width="5" stroke-linecap="round" opacity="0.18"/>
  </g>
</svg>
