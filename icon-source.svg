<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Deep blue premium backdrop -->
    <radialGradient id="bgGrad" cx="48%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#13243d"/>
      <stop offset="100%" stop-color="#060d19"/>
    </radialGradient>
    <!-- Gold crescent gradient -->
    <linearGradient id="goldCrescent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4dfa0"/>
      <stop offset="55%" stop-color="#d7b356"/>
      <stop offset="100%" stop-color="#b98e33"/>
    </linearGradient>
    <!-- Soft gold glow -->
    <radialGradient id="glowGrad" cx="46%" cy="44%" r="40%">
      <stop offset="0%" stop-color="#d9b860" stop-opacity="0.36"/>
      <stop offset="100%" stop-color="#d9b860" stop-opacity="0"/>
    </radialGradient>
    <filter id="shapeShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#03070f" flood-opacity="0.7"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>

  <!-- Subtle inner border -->
  <rect x="16" y="16" width="480" height="480" rx="98" fill="none" stroke="#d6b25a" stroke-width="1.5" opacity="0.2"/>

  <!-- Radial glow behind crescent -->
  <circle cx="256" cy="256" r="160" fill="url(#glowGrad)"/>

  <!-- Primary crescent -->
  <circle cx="248" cy="250" r="130" fill="url(#goldCrescent)" filter="url(#shapeShadow)"/>
  <circle cx="292" cy="230" r="112" fill="#0a1322"/>

  <!-- Small accent star -->
  <path d="M337 175l8 18 19 2-14 12 4 18-17-9-17 9 4-18-14-12 19-2 8-18z" fill="url(#goldCrescent)" opacity="0.92"/>

  <!-- Outer ring for definition at small sizes -->
  <circle cx="256" cy="256" r="174" fill="none" stroke="#e7c979" stroke-width="2" opacity="0.46"/>
</svg>
