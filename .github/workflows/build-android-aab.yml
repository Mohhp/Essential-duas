name: Build Android AAB

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: "Android versionCode (must be higher than Play current)"
        required: true
        default: "10"
      version_name:
        description: "Android versionName"
        required: true
        default: "2.1.0"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: |
          yes | sdkmanager --licenses
          sdkmanager --update
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Configure Android local.properties
        run: |
          printf 'sdk.dir=%s\n' "$ANDROID_SDK_ROOT" > android/local.properties
          cat android/local.properties

      - name: Validate required secrets
        run: |
          test -n "${{ secrets.KEYSTORE_BASE64 }}"
          test -n "${{ secrets.KEYSTORE_PASSWORD }}"
          test -n "${{ secrets.KEY_PASSWORD }}"
          test -n "${{ secrets.KEY_ALIAS }}"

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/signing.keystore
          ls -lh android/signing.keystore

      - name: Update Android version
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('android/app/build.gradle.kts')
          text = path.read_text(encoding='utf-8')
          text = re.sub(r'versionCode = \d+', 'versionCode = ' + '${{ github.event.inputs.version_code }}', text)
          text = re.sub(r'versionName = "[^"]+"', 'versionName = "' + '${{ github.event.inputs.version_name }}' + '"', text)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Build signed bundle
        working-directory: android
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/android/signing.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle :app:bundleRelease :app:assembleRelease --stacktrace

      - name: Show generated artifacts
        run: find android/app/build/outputs -type f \( -name "*.aab" -o -name "*.apk" \) | sort

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: essential-duas-aab-v${{ github.event.inputs.version_code }}
          path: android/app/build/outputs/bundle/release/*.aab

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: essential-duas-apk-v${{ github.event.inputs.version_code }}
          path: android/app/build/outputs/apk/release/*.apk
