<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="8%" r="100%">
      <stop offset="0%" stop-color="#18304c"/>
      <stop offset="42%" stop-color="#0f1d30"/>
      <stop offset="100%" stop-color="#060d17"/>
    </radialGradient>
    <radialGradient id="topGoldGlow" cx="48%" cy="26%" r="40%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.28"/>
      <stop offset="58%" stop-color="#c9a84c" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bottomGreenGlow" cx="50%" cy="78%" r="34%">
      <stop offset="0%" stop-color="#2ecc71" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#2ecc71" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="12%" y1="10%" x2="88%" y2="92%">
      <stop offset="0%" stop-color="#f1d68d"/>
      <stop offset="52%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#8f712c"/>
    </linearGradient>
    <linearGradient id="ivory" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#fff9ed"/>
      <stop offset="100%" stop-color="#f4e3bf"/>
    </linearGradient>
    <filter id="panelShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="18" stdDeviation="30" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <filter id="goldGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#c9a84c" flood-opacity="0.28"/>
      <feDropShadow dx="0" dy="0" stdDeviation="22" flood-color="#c9a84c" flood-opacity="0.12"/>
    </filter>
    <filter id="textGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#fff9ed" flood-opacity="0.16"/>
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#c9a84c" flood-opacity="0.22"/>
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <filter id="bookGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#c9a84c" flood-opacity="0.10"/>
    </filter>
    <mask id="crescentMask">
      <rect width="1024" height="1024" fill="black"/>
      <circle cx="452" cy="352" r="184" fill="white"/>
      <circle cx="534" cy="322" r="170" fill="black"/>
    </mask>
  </defs>

  <rect width="1024" height="1024" fill="#060d17"/>
  <rect x="18" y="18" width="988" height="988" rx="224" fill="url(#bg)" filter="url(#panelShadow)"/>
  <rect x="40" y="40" width="944" height="944" rx="202" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="2"/>

  <ellipse cx="512" cy="310" rx="300" ry="210" fill="url(#topGoldGlow)"/>
  <ellipse cx="512" cy="748" rx="246" ry="138" fill="url(#bottomGreenGlow)"/>

  <g opacity="0.10">
    <path d="M278 212c82-58 160-86 234-86 109 0 193 36 264 112" fill="none" stroke="#c9a84c" stroke-width="3" stroke-linecap="round"/>
    <path d="M262 804c70 46 152 70 250 70 98 0 180-24 250-70" fill="none" stroke="#2ecc71" stroke-width="2" stroke-linecap="round"/>
  </g>

  <g filter="url(#goldGlow)">
    <rect width="1024" height="1024" fill="url(#gold)" mask="url(#crescentMask)"/>
  </g>

  <g filter="url(#textGlow)">
    <text x="512" y="592" text-anchor="middle" direction="rtl" unicode-bidi="bidi-override" font-family="Noto Naskh Arabic, serif" font-size="258" font-weight="700" fill="url(#ivory)">فلاح</text>
  </g>

  <g opacity="0.62" filter="url(#bookGlow)">
    <path d="M368 694c41-22 89-34 144-34 55 0 103 12 144 34" fill="none" stroke="#dcc58a" stroke-width="17" stroke-linecap="round"/>
    <path d="M417 680c30-8 62-12 95-12 33 0 65 4 95 12" fill="none" stroke="#c9a84c" stroke-width="5" stroke-linecap="round" opacity="0.74"/>
    <path d="M512 662v56" fill="none" stroke="#fff9ed" stroke-opacity="0.18" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g opacity="0.12">
    <circle cx="512" cy="512" r="282" fill="none" stroke="#ffffff" stroke-width="1.5"/>
  </g>
</svg>