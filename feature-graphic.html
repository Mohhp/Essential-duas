<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024">
<title>Falah — Feature Graphic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1024px; height: 500px;
    overflow: hidden;
    background: #060D1A;
    font-family: 'Inter', Arial, sans-serif;
  }

  .canvas {
    width: 1024px; height: 500px;
    position: relative;
    background: radial-gradient(ellipse 70% 120% at 35% 45%, #0E1C34 0%, #08101A 55%, #030508 100%);
    overflow: hidden;
    display: flex;
    align-items: center;
  }

  /* ── Decorative geometry ───────────────────── */
  .deco-ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid #C9A84C;
    opacity: 0.07;
  }
  .deco-ring.r1 { width: 520px; height: 520px; top: -110px; left: -60px; }
  .deco-ring.r2 { width: 380px; height: 380px; top: -40px; left: 10px; }
  .deco-ring.r3 { width: 800px; height: 800px; bottom: -350px; right: -180px; opacity: 0.04; }

  .deco-h-line {
    position: absolute;
    left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, #C9A84C22 30%, #C9A84C44 50%, #C9A84C22 70%, transparent 100%);
  }
  .deco-h-line.top { top: 48px; }
  .deco-h-line.bot { bottom: 48px; }

  /* ── Left column — icon ────────────────────── */
  .left-col {
    flex: 0 0 340px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding-left: 48px;
    position: relative;
    z-index: 2;
  }

  .icon-wrap {
    width: 210px; height: 210px;
    border-radius: 46px;
    overflow: hidden;
    box-shadow:
      0 0 0 1px #C9A84C26,
      0 12px 48px #00000080,
      0 2px 12px #C9A84C18;
    flex-shrink: 0;
  }

  .icon-wrap svg {
    display: block;
    width: 210px; height: 210px;
  }

  /* ── Right column — copy ───────────────────── */
  .right-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 52px 0 40px;
    position: relative;
    z-index: 2;
  }

  /* Divider line between columns */
  .divider {
    position: absolute;
    left: 340px;
    top: 60px; bottom: 60px;
    width: 1px;
    background: linear-gradient(180deg, transparent, #C9A84C30 30%, #C9A84C30 70%, transparent);
    z-index: 1;
  }

  .arabic-label {
    font-family: 'Amiri', 'Times New Roman', serif;
    font-size: 18px;
    color: #C9A84C;
    letter-spacing: 0.04em;
    opacity: 0.85;
    margin-bottom: 6px;
    direction: rtl;
    text-align: left;
  }

  .app-name {
    font-size: 78px;
    font-weight: 900;
    line-height: 0.95;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #FDF5CB 0%, #EDD66C 25%, #C9A84C 55%, #9A7520 85%, #5A400D 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
  }

  .tagline {
    font-size: 15px;
    font-weight: 400;
    color: #8FA8C8;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .tagline span {
    color: #C9A84C;
    opacity: 0.7;
    margin: 0 6px;
  }

  .features-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px 14px;
    margin-bottom: 28px;
  }

  .feat {
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .feat-icon {
    font-size: 15px;
    line-height: 1;
    flex-shrink: 0;
  }

  .feat-text {
    font-size: 12.5px;
    font-weight: 500;
    color: #B8CCDF;
    letter-spacing: 0.01em;
  }

  .bottom-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 16px;
    border-top: 1px solid #C9A84C18;
  }

  .pashto-label {
    font-family: 'Amiri', 'Times New Roman', serif;
    font-size: 13px;
    color: #C9A84C;
    opacity: 0.65;
    direction: rtl;
  }

  .author {
    font-size: 11px;
    font-weight: 300;
    color: #4A6280;
    letter-spacing: 0.05em;
  }

  .badge {
    background: linear-gradient(135deg, #C9A84C18, #C9A84C08);
    border: 1px solid #C9A84C30;
    border-radius: 4px;
    padding: 4px 10px;
    font-size: 11px;
    font-weight: 600;
    color: #C9A84C;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="canvas">

  <!-- Decorative rings -->
  <div class="deco-ring r1"></div>
  <div class="deco-ring r2"></div>
  <div class="deco-ring r3"></div>
  <div class="deco-h-line top"></div>
  <div class="deco-h-line bot"></div>

  <div class="left-col">
    <div class="icon-wrap">
      <!-- Inline icon SVG — same crescent+star design as favicon.svg -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
        <defs>
          <radialGradient id="bg" cx="40%" cy="38%" r="72%">
            <stop offset="0%"   stop-color="#0E1725"/>
            <stop offset="50%"  stop-color="#08101A"/>
            <stop offset="100%" stop-color="#030508"/>
          </radialGradient>
          <linearGradient id="gold" x1="72" y1="72" x2="440" y2="440" gradientUnits="userSpaceOnUse">
            <stop offset="0%"   stop-color="#FDF5CB"/>
            <stop offset="14%"  stop-color="#EDD66C"/>
            <stop offset="40%"  stop-color="#C9A84C"/>
            <stop offset="70%"  stop-color="#9A7520"/>
            <stop offset="100%" stop-color="#5A400D"/>
          </linearGradient>
          <clipPath id="icon">
            <rect width="512" height="512" rx="108" ry="108"/>
          </clipPath>
        </defs>
        <g clip-path="url(#icon)">
          <rect width="512" height="512" fill="url(#bg)"/>
          <circle cx="235" cy="270" r="195" fill="#C9A84C" fill-opacity="0.05"/>
          <path fill-rule="evenodd"
                d="M  86,258 A 168,168 0 1 0 422,258 A 168,168 0 1 0  86,258 Z
                   M 151,210 A 145,145 0 1 0 441,210 A 145,145 0 1 0 151,210 Z"
                fill="url(#gold)"/>
          <polygon
            transform="translate(312,192)"
            points="0,-26 4.13,-9.98 18.38,-18.38 9.98,-4.13 26,0 9.98,4.13 18.38,18.38 4.13,9.98
                    0,26 -4.13,9.98 -18.38,18.38 -9.98,4.13 -26,0 -9.98,-4.13 -18.38,-18.38 -4.13,-9.98"
            fill="url(#gold)"/>
          <rect x="10" y="10" width="492" height="492" rx="100" ry="100"
                fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-opacity="0.22"/>
        </g>
      </svg>
    </div>
  </div>

  <div class="divider"></div>

  <div class="right-col">
    <div class="arabic-label">حيّ على الفلاح — تطبيق المسلم اليومي</div>
    <div class="app-name">Falah</div>
    <div class="tagline">
      Quran <span>·</span> Duas <span>·</span> Prayer Times <span>·</span> Pashto Audio
    </div>

    <div class="features-grid">
      <div class="feat"><span class="feat-icon">📖</span><span class="feat-text">Quran Juz 30</span></div>
      <div class="feat"><span class="feat-icon">🤲</span><span class="feat-text">60+ Essential Duas</span></div>
      <div class="feat"><span class="feat-icon">🕌</span><span class="feat-text">5 Prayer Times</span></div>
      <div class="feat"><span class="feat-icon">📿</span><span class="feat-text">Tasbeeh Counter</span></div>
      <div class="feat"><span class="feat-icon">🧭</span><span class="feat-text">Qibla Compass</span></div>
      <div class="feat"><span class="feat-icon">📜</span><span class="feat-text">40 Hadith</span></div>
    </div>

    <div class="bottom-bar">
      <div class="pashto-label">د پښتو اوډیو سره</div>
      <div class="badge">Free · Offline</div>
      <div class="author">By المهندس محمد فلاح</div>
    </div>
  </div>

</div>
</body>
</html>
