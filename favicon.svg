<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>

    <!-- Deep midnight sky: rich indigo at centre, near-black at edges -->
    <radialGradient id="bg" cx="40%" cy="38%" r="72%">
      <stop offset="0%"   stop-color="#0E1725"/>
      <stop offset="50%"  stop-color="#08101A"/>
      <stop offset="100%" stop-color="#030508"/>
    </radialGradient>

    <!--
      Antique metallic gold — warm ivory highlight (upper-left light source)
      fading to deep amber shadow (lower-right). gradientUnits=userSpaceOnUse
      ensures the crescent and star share the same absolute gradient coords,
      giving a naturally cohesive metallic sheen across both shapes.
    -->
    <linearGradient id="gold"
        x1="72" y1="72" x2="440" y2="440"
        gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FDF5CB"/>
      <stop offset="14%"  stop-color="#EDD66C"/>
      <stop offset="40%"  stop-color="#C9A84C"/>
      <stop offset="70%"  stop-color="#9A7520"/>
      <stop offset="100%" stop-color="#5A400D"/>
    </linearGradient>

    <!-- Rounded-square clip for the icon boundary -->
    <clipPath id="icon">
      <rect width="512" height="512" rx="108" ry="108"/>
    </clipPath>

  </defs>

  <g clip-path="url(#icon)">

    <!-- 1. Deep midnight background -->
    <rect width="512" height="512" fill="url(#bg)"/>

    <!-- 2. Subtle warmth behind crescent area — no filter, just a tinted circle -->
    <circle cx="235" cy="270" r="195" fill="#C9A84C" fill-opacity="0.05"/>

    <!--
      3. Crescent moon — even-odd compound path (two full circles).
         Outer: cx=254 cy=258 r=168  |  Inner (shifted upper-right): cx=296 cy=210 r=145
         The even-odd fill rule fills the outer-only region (crescent arm) and
         leaves the overlap region (where both circles cover = inner circle area) transparent.
         Arm width ~87px (8px at 48px), horn span ~286px (27px at 48px).
         No mask, no filter. Purely geometric — renders cleanly at every size.
    -->
    <path fill-rule="evenodd"
          d="M  86,258 A 168,168 0 1 0 422,258 A 168,168 0 1 0  86,258 Z
             M 151,210 A 145,145 0 1 0 441,210 A 145,145 0 1 0 151,210 Z"
          fill="url(#gold)"/>

    <!--
      4. Eight-pointed star — floats in the dark concave bowl of the crescent.
         Position (312,192): inside the inner-circle hollow, on dark background.
         Outer radius R=26, inner radius r=10.8.
         At 48px the star is ~2.4px radius — a refined dot of light;
         at 512px it is a jewel sitting in the crescent's opening.
    -->
    <polygon
      transform="translate(312,192)"
      points="0,-26 4.13,-9.98 18.38,-18.38 9.98,-4.13 26,0 9.98,4.13 18.38,18.38 4.13,9.98
              0,26 -4.13,9.98 -18.38,18.38 -9.98,4.13 -26,0 -9.98,-4.13 -18.38,-18.38 -4.13,-9.98"
      fill="url(#gold)"/>

    <!-- 5. Premium inner border ring — single gold thread, very low opacity -->
    <rect x="10" y="10" width="492" height="492" rx="100" ry="100"
          fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-opacity="0.22"/>

  </g>
</svg>