<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111e38"/>
      <stop offset="45%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#060d1d"/>
    </linearGradient>
    <radialGradient id="ambientGlow" cx="44%" cy="46%" r="52%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldCrescent" x1="15%" y1="5%" x2="85%" y2="95%">
      <stop offset="0%" stop-color="#f5df82"/>
      <stop offset="30%" stop-color="#d4a847"/>
      <stop offset="65%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#9a7520"/>
    </linearGradient>
    <linearGradient id="starGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8e89a"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
    <mask id="crescentCut">
      <rect width="512" height="512" fill="black"/>
      <circle cx="242" cy="258" r="138" fill="white"/>
      <circle cx="294" cy="228" r="122" fill="black"/>
    </mask>
    <filter id="crescentGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feFlood flood-color="#d4a847" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="geomPattern" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse" patternTransform="rotate(30)">
      <line x1="0" y1="0" x2="48" y2="48" stroke="rgba(201,168,76,0.04)" stroke-width="0.8"/>
      <line x1="48" y1="0" x2="0" y2="48" stroke="rgba(201,168,76,0.03)" stroke-width="0.8"/>
    </pattern>
    <clipPath id="roundedSquare">
      <rect width="512" height="512" rx="108" ry="108"/>
    </clipPath>
  </defs>

  <g clip-path="url(#roundedSquare)">
    <rect width="512" height="512" fill="url(#bgGrad)"/>
    <rect width="512" height="512" fill="url(#geomPattern)"/>
    <rect width="512" height="512" fill="url(#ambientGlow)"/>

    <!-- Outer glow halo behind crescent -->
    <circle cx="242" cy="258" r="148" fill="#c9a84c" opacity="0.06"/>

    <!-- Crescent moon -->
    <circle cx="242" cy="258" r="138" fill="url(#goldCrescent)" mask="url(#crescentCut)" filter="url(#crescentGlow)"/>

    <!-- Crescent inner highlight -->
    <circle cx="242" cy="258" r="136" fill="none" stroke="#f5df82" stroke-width="2.5" stroke-opacity="0.28" mask="url(#crescentCut)"/>

    <!-- Four-pointed star -->
    <g transform="translate(355,172) rotate(15)" filter="url(#crescentGlow)">
      <polygon points="0,-18 4,-4 18,0 4,4 0,18 -4,4 -18,0 -4,-4"
               fill="url(#starGold)" opacity="0.92"/>
    </g>

    <!-- Accent dots (subtle tasbeeh motif) -->
    <circle cx="170" cy="358" r="5.5" fill="#d4a847" opacity="0.5"/>
    <circle cx="190" cy="372" r="4"   fill="#d4a847" opacity="0.38"/>
    <circle cx="214" cy="381" r="3"   fill="#d4a847" opacity="0.26"/>

    <!-- Premium border rings -->
    <rect x="6" y="6" width="500" height="500" rx="103" fill="none"
          stroke="#c9a84c" stroke-width="1.5" stroke-opacity="0.22"/>
    <rect x="15" y="15" width="482" height="482" rx="95" fill="none"
          stroke="#c9a84c" stroke-width="1" stroke-opacity="0.08"/>
  </g>
</svg>
