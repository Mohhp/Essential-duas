<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>

    <!--
      BACKGROUND — richer vignette: warm indigo at focus, near-black at edges.
      Radial centre offset toward upper-left to match the light-source direction
      of the gold gradient so everything reads as a single coherent light model.
    -->
    <radialGradient id="bg" cx="38%" cy="35%" r="72%">
      <stop offset="0%"   stop-color="#14243E"/>
      <stop offset="48%"  stop-color="#08101C"/>
      <stop offset="100%" stop-color="#020508"/>
    </radialGradient>

    <!--
      GOLD — antique metallic sheen: ivory highlight (upper-left) fading to
      deep amber shadow (lower-right). gradientUnits=userSpaceOnUse so crescent
      and star share the same absolute coordinates — giving the star the same
      metallic light as the crescent arm, as if both are the same cast object.
    -->
    <linearGradient id="gold"
        x1="80"  y1="80"
        x2="430" y2="430"
        gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FDF5CB"/>
      <stop offset="14%"  stop-color="#EDD66C"/>
      <stop offset="40%"  stop-color="#C9A84C"/>
      <stop offset="70%"  stop-color="#9A7520"/>
      <stop offset="100%" stop-color="#5A400D"/>
    </linearGradient>

    <!-- Lighter highlight gradient for the rim stroke -->
    <linearGradient id="rim"
        x1="100" y1="60"
        x2="380" y2="340"
        gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FEFCE8"/>
      <stop offset="50%"  stop-color="#F0D97A"/>
      <stop offset="100%" stop-color="#A8801C"/>
    </linearGradient>

    <!-- Rounded-square icon clip (Google/iOS style) -->
    <clipPath id="icon">
      <rect width="512" height="512" rx="108" ry="108"/>
    </clipPath>

  </defs>

  <g clip-path="url(#icon)">

    <!-- 1 ─── Deep midnight background with vignette -->
    <rect width="512" height="512" fill="url(#bg)"/>

    <!--
      2 ─── Moonlight ambient glow
      A soft, very-low-opacity gold circle behind the crescent gives the
      impression of scattered light around the moon — without any SVG filter.
      Two circles at different opacities create a gradient-like fade.
    -->
    <circle cx="248" cy="222" r="210" fill="#C9A84C" fill-opacity="0.07"/>
    <circle cx="248" cy="222" r="155" fill="#EDD66C" fill-opacity="0.04"/>

    <!--
      3 ─── Crescent moon (THIN elegant sickle)
      Even-odd compound path = two full circles drawn as one path.
      The even-odd fill rule keeps only the area inside the outer ring that
      is NOT covered by the inner circle — producing the crescent sickle.

      Geometry:
        Outer circle: cx=256, cy=228, r=178
        Inner circle: cx=286, cy=194, r=172   (shifted 30px right, 34px up → d=45.3px)
        → arm width at thickest: 38.8px  (3.6px at 48px icon = 55% thinner than before)
        → horn-to-horn span: 358px      (33.6px at 48px)
        → gold area coverage: ~13%

      The crescent opens toward upper-right: the bowl faces the star.
      No filter, no mask. Pure geometry — renders identically at every size.
    -->
    <path fill-rule="evenodd"
          d="M  78,228 A 178,178 0 1 0 434,228 A 178,178 0 1 0  78,228 Z
             M 114,194 A 172,172 0 1 0 458,194 A 172,172 0 1 0 114,194 Z"
          fill="url(#gold)"/>

    <!--
      4 ─── Crescent rim highlight
      A thin stroke on the outer circle simulates metallic rim lighting —
      the bright edge you'd see on a polished gold object lit from upper-left.
      Placed AFTER the crescent fill so it sits on top. Opacity 0.30 is subtle
      enough that the sections over dark background barely register.
    -->
    <circle cx="256" cy="228" r="178"
            fill="none"
            stroke="url(#rim)"
            stroke-width="2.5"
            stroke-opacity="0.32"/>

    <!--
      5 ─── Eight-pointed star in the dark concave bowl
      Position (295, 205): well inside the inner-circle dark region
        (distance to inner center = 14px, inner r = 172 → safe margin: 158px)
      Outer radius R=42, inner r=17.4  (was R=26, now 62% larger — clearly
        visible at 192px, a glint of light at 48px, a jewel at 512px)
      The star shares the gold gradient: upper tips are ivory, lower amber.
    -->
    <polygon
      transform="translate(295,205)"
      points="0,-42 6.67,-16.13 29.7,-29.7 16.13,-6.67 42,0 16.13,6.67 29.7,29.7 6.67,16.13
              0,42 -6.67,16.13 -29.7,29.7 -16.13,6.67 -42,0 -16.13,-6.67 -29.7,-29.7 -6.67,-16.13"
      fill="url(#gold)"/>

    <!--
      6 ─── "FALAH" wordmark
      Refined spaced capitals in the lower quarter of the icon.
      Baseline y=464: bottom of text ≈ y=470 (12px from corner clip).
      Top of text ≈ y=418: crescent bottom point is y=406 → clean 12px margin.
      At 48px icon: renders as a 4.3px line — a subtle brand mark; fully
        legible at 96px+.
    -->
    <text
      x="256" y="464"
      text-anchor="middle"
      font-family="Liberation Sans, Arial, sans-serif"
      font-size="44"
      font-weight="700"
      fill="url(#gold)"
      letter-spacing="11">FALAH</text>

    <!-- 7 ─── Premium 1px inner border ring — barely visible gold thread -->
    <rect x="10" y="10" width="492" height="492" rx="100" ry="100"
          fill="none"
          stroke="#D4AF37"
          stroke-width="1.5"
          stroke-opacity="0.24"/>

  </g>
</svg>