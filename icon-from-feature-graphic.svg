<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bgGlowGold" cx="22%" cy="18%" r="58%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.22"/>
      <stop offset="42%" stop-color="#c9a84c" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgGlowGreen" cx="78%" cy="84%" r="48%">
      <stop offset="0%" stop-color="#2ecc71" stop-opacity="0.18"/>
      <stop offset="40%" stop-color="#2ecc71" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#2ecc71" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14233a"/>
      <stop offset="34%" stop-color="#0f1d30"/>
      <stop offset="70%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#050b14"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#102236"/>
      <stop offset="55%" stop-color="#0a1827"/>
      <stop offset="100%" stop-color="#08111e"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="16%" y1="10%" x2="84%" y2="90%">
      <stop offset="0%" stop-color="#efd082"/>
      <stop offset="55%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#896b28"/>
    </linearGradient>
    <linearGradient id="ivoryGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#fffaf0"/>
      <stop offset="100%" stop-color="#f0e0b7"/>
    </linearGradient>
    <linearGradient id="greenCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d07c"/>
      <stop offset="100%" stop-color="#1cae63"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="34" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <filter id="goldGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#c9a84c" flood-opacity="0.26"/>
    </filter>
    <filter id="textGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#c9a84c" flood-opacity="0.18"/>
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <filter id="greenGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="#2ecc71" flood-opacity="0.24"/>
    </filter>
    <mask id="crescentMask">
      <rect width="1024" height="1024" fill="black"/>
      <circle cx="390" cy="334" r="86" fill="white"/>
      <circle cx="428" cy="316" r="76" fill="black"/>
    </mask>
  </defs>

  <rect width="1024" height="1024" fill="#050b14"/>
  <rect x="18" y="18" width="988" height="988" rx="224" fill="url(#bgGrad)"/>
  <ellipse cx="236" cy="210" rx="300" ry="280" fill="url(#bgGlowGold)"/>
  <ellipse cx="800" cy="836" rx="260" ry="210" fill="url(#bgGlowGreen)"/>
  <rect x="38" y="38" width="948" height="948" rx="206" fill="none" stroke="rgba(255,255,255,0.06)"/>

  <g opacity="0.08">
    <circle cx="242" cy="302" r="310" fill="none" stroke="#c9a84c" stroke-width="2"/>
    <circle cx="840" cy="248" r="250" fill="none" stroke="#ffffff" stroke-width="1.5"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="238" y="158" width="548" height="708" rx="76" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.10)" stroke-width="2"/>
    <rect x="260" y="180" width="504" height="664" rx="58" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1.5"/>
    <rect x="434" y="186" width="156" height="10" rx="5" fill="rgba(255,255,255,0.08)"/>
  </g>

  <g filter="url(#goldGlow)">
    <rect width="1024" height="1024" fill="url(#goldGrad)" mask="url(#crescentMask)"/>
  </g>

  <rect x="316" y="274" width="148" height="148" rx="38" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>

  <g opacity="0.78">
    <path d="M300 240h120" fill="none" stroke="#2ecc71" stroke-width="3" stroke-linecap="round"/>
  </g>

  <g filter="url(#textGlow)">
    <text x="512" y="510" text-anchor="middle" direction="rtl" unicode-bidi="bidi-override" font-family="Amiri, Noto Naskh Arabic, serif" font-size="188" font-weight="700" fill="url(#ivoryGrad)">فلاح</text>
  </g>

  <g opacity="0.78">
    <path d="M360 556c43-18 94-27 152-27 58 0 109 9 152 27" fill="none" stroke="#c9a84c" stroke-width="8" stroke-linecap="round"/>
  </g>

  <g filter="url(#greenGlow)">
    <rect x="286" y="612" width="452" height="136" rx="32" fill="url(#greenCard)"/>
  </g>

  <g opacity="0.18">
    <circle cx="687" cy="650" r="70" fill="#ffffff"/>
    <circle cx="642" cy="698" r="100" fill="#ffffff"/>
  </g>

  <g opacity="0.72">
    <path d="M354 802c48-28 101-42 158-42 57 0 110 14 158 42" fill="none" stroke="#d9c692" stroke-width="16" stroke-linecap="round"/>
    <path d="M414 786c31-9 64-13 98-13 34 0 67 4 98 13" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>